<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<title>연안 표층수온 연·월 대시보드 (2021–2025)</title>
<style>
  :root{
    --bg:#eaf1f5; --surface:#ffffff; --surface-2:#f4f8fb; --surface-3:#e9f0f4;
    --ink:#0f2b39; --muted:#5a7480; --faint:#93a8b3; --hair:#dae6ec;
    --accent:#0e7c9c; --accent-soft:#d9edf3;
    --shadow:0 1px 2px rgba(15,43,57,.05),0 10px 32px rgba(15,43,57,.10);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#07141a; --surface:#0f232d; --surface-2:#0c1d26; --surface-3:#132b36;
    --ink:#e7f1f6; --muted:#8aa6b2; --faint:#5c7a86; --hair:#1b3540;
    --accent:#54bcd8; --accent-soft:#123742;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 38px rgba(0,0,0,.5);
  }}
  :root[data-theme="dark"]{
    --bg:#07141a; --surface:#0f232d; --surface-2:#0c1d26; --surface-3:#132b36;
    --ink:#e7f1f6; --muted:#8aa6b2; --faint:#5c7a86; --hair:#1b3540;
    --accent:#54bcd8; --accent-soft:#123742;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 38px rgba(0,0,0,.5);
  }
  :root[data-theme="light"]{
    --bg:#eaf1f5; --surface:#ffffff; --surface-2:#f4f8fb; --surface-3:#e9f0f4;
    --ink:#0f2b39; --muted:#5a7480; --faint:#93a8b3; --hair:#dae6ec;
    --accent:#0e7c9c; --accent-soft:#d9edf3;
    --shadow:0 1px 2px rgba(15,43,57,.05),0 10px 32px rgba(15,43,57,.10);
  }
  *{box-sizing:border-box}
  .wrap{font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",system-ui,-apple-system,sans-serif;
    color:var(--ink); background:var(--bg); min-height:100%; padding:clamp(14px,2.4vw,30px); line-height:1.5; -webkit-font-smoothing:antialiased}
  .board{max-width:1160px; margin:0 auto; display:flex; flex-direction:column; gap:14px}
  .top{display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:12px}
  .eyebrow{font-size:11.5px; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); font-weight:700; margin:0 0 6px}
  h1{font-size:clamp(20px,3vw,28px); margin:0; font-weight:800; letter-spacing:-.01em}
  .src{font-size:12px; color:var(--muted); margin:6px 0 0}
  .src b{color:var(--ink); font-weight:600}
  .chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--muted);
    background:var(--surface); border:1px solid var(--hair); padding:7px 12px; border-radius:999px; box-shadow:var(--shadow)}
  .chip b{color:var(--ink)}

  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:12px}
  @media (max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface); border:1px solid var(--hair); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow)}
  .kpi .k{font-size:11.5px; color:var(--muted); font-weight:600; margin:0 0 7px}
  .kpi .v{font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; line-height:1}
  .kpi .u{font-size:13px; color:var(--muted); font-weight:600}
  .kpi .sub{font-size:11.5px; color:var(--muted); margin-top:5px}

  .tabs{display:flex; gap:6px; flex-wrap:wrap}
  .tab{font-family:inherit; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer;
    background:var(--surface); border:1px solid var(--hair); padding:8px 16px; border-radius:999px; transition:all .12s}
  .tab:hover{color:var(--ink)}
  .tab[aria-selected="true"]{background:var(--accent); color:#fff; border-color:var(--accent)}
  @media (prefers-reduced-motion:reduce){.tab{transition:none}}

  .panel{background:var(--surface); border:1px solid var(--hair); border-radius:16px; box-shadow:var(--shadow); padding:16px 18px 18px}
  .panel h2{font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:700; margin:0 0 4px}
  .panel .h2sub{font-size:12px; color:var(--muted); margin:0 0 14px}

  /* heatmap */
  .hm{display:grid; gap:3px}
  .hm .hcell{border-radius:5px; text-align:center; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums;
    padding:9px 2px; cursor:default; position:relative}
  .hm .hhead{background:transparent; color:var(--muted); font-weight:700; font-size:11.5px; padding:4px 2px; cursor:default}
  .hm .hrow{color:var(--muted); font-weight:700; font-size:12.5px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px}
  .hm .na{background:var(--surface-3); color:var(--faint)}

  .two{display:grid; grid-template-columns:1.35fr 1fr; gap:14px}
  @media (max-width:820px){.two{grid-template-columns:1fr}}
  svg{width:100%; height:auto; display:block; overflow:visible}
  .axis{stroke:var(--hair); stroke-width:1}
  .grid{stroke:var(--hair); stroke-width:1; opacity:.6}
  .atick{fill:var(--muted); font-size:10.5px; font-variant-numeric:tabular-nums}
  .yline{fill:none; stroke-width:2; stroke-linejoin:round; stroke-linecap:round}
  .legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:12px}
  .lg{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); font-weight:600}
  .lg i{width:16px; height:3px; border-radius:2px; display:inline-block}

  .abar{display:flex; align-items:flex-end; gap:10px; height:150px; padding-top:6px}
  .abar .col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%}
  .abar .bar{width:70%; border-radius:6px 6px 0 0; min-height:3px}
  .abar .bv{font-size:12px; font-weight:800; font-variant-numeric:tabular-nums}
  .abar .by{font-size:11.5px; color:var(--muted); font-weight:600}

  .rampbar{height:12px; border-radius:6px; border:1px solid var(--hair)}
  .rampticks{display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted); margin-top:4px; font-variant-numeric:tabular-nums}

  footer{color:var(--muted); font-size:11.5px; line-height:1.6; padding:2px 4px 4px}
  footer b{color:var(--ink)}
  .tip{position:fixed; pointer-events:none; z-index:50; opacity:0; transform:translate(-50%,-115%); transition:opacity .08s;
    background:var(--ink); color:var(--surface); padding:8px 11px; border-radius:9px; font-size:12px; box-shadow:0 8px 24px rgba(0,0,0,.3); white-space:nowrap}
  .tip .tt{font-size:10.5px; opacity:.7; margin-bottom:3px; text-transform:uppercase; letter-spacing:.05em}
  .tip .tr{display:flex; justify-content:space-between; gap:14px; font-variant-numeric:tabular-nums}
  .tip .tr b{font-weight:700}
</style>

<div class="wrap"><div class="board">
  <div class="top">
    <div>
      <p class="eyebrow">대한민국 연안 해양환경 · 표층수온 시계열</p>
      <h1>연안 표층수온 연·월 대시보드</h1>
      <p class="src">출처 <b>국립수산과학원 실시간 연안 해양관측</b> · 2021–2025 · <b id="obs"></b> 관측 레코드에서 집계</p>
    </div>
    <span class="chip">🌡️ <b>실측 데이터</b> · 월평균 표층수온</span>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="tabs" id="tabs" role="tablist"></div>

  <div class="panel">
    <h2>연도 × 월 표층수온 히트맵</h2>
    <p class="h2sub" id="hmsub"></p>
    <div id="hm"></div>
    <div style="max-width:420px;margin-top:16px">
      <div class="rampbar" id="ramp"></div>
      <div class="rampticks"><span>4°</span><span>10°</span><span>16°</span><span>22°</span><span>28°C</span></div>
    </div>
  </div>

  <div class="two">
    <div class="panel">
      <h2>월별 계절 곡선 (연도 비교)</h2>
      <p class="h2sub">가로축 월 · 세로축 표층수온(℃)</p>
      <div id="line"></div>
      <div class="legend" id="ylegend"></div>
    </div>
    <div class="panel">
      <h2>연평균 표층수온</h2>
      <p class="h2sub" id="atsub">12개월 평균</p>
      <div class="abar" id="abar"></div>
    </div>
  </div>

  <footer id="foot"></footer>
</div></div>
<div class="tip" id="tip"></div>

<script>
(function(){
  const DATA={"source":"국립수산과학원 실시간 연안 해양관측 (Sea of korea degree)","variable":"표층수온(℃)","years":[2021,2022,2023,2024,2025],"seas":["동해","서해","남해"],"data":{"동해":{"2021":[12.08,11.05,11.99,12.98,14.68,18.34,23.12,24.72,23.21,21.61,17.36,14.14],"2022":[12.05,10.48,10.42,11.97,14.9,17.82,22.01,22.18,22.83,19.51,17.62,14.9],"2023":[12.34,11.52,12.25,13.12,14.63,18.09,19.33,24.28,24.83,21.21,16.44,13.62],"2024":[11.15,9.26,10.08,13.58,14.67,18.58,19.31,24.69,25.86,22.11,19.0,14.59],"2025":[12.3,10.27,10.18,11.09,13.39,16.21,21.24,21.83,23.26,21.25,17.77,14.81]},"서해":{"2021":[5.44,5.16,7.28,10.95,14.54,18.91,23.01,25.11,23.68,20.83,15.18,10.2],"2022":[6.08,4.68,6.68,10.84,15.03,19.14,23.85,25.59,22.35,18.34,14.73,8.76],"2023":[5.82,5.01,7.44,11.01,15.04,19.3,22.76,24.79,24.12,19.88,15.04,9.77],"2024":[7.02,6.73,7.96,11.95,16.06,20.03,23.42,26.95,26.38,21.74,16.77,10.25],"2025":[6.64,4.58,6.53,10.31,14.35,18.95,23.93,26.44,25.42,21.29,15.19,9.99]},"남해":{"2021":[10.37,10.43,11.89,14.22,16.64,20.25,24.42,26.25,24.21,22.0,16.55,12.62],"2022":[9.92,8.66,10.4,13.63,16.46,19.75,22.96,24.07,23.54,20.21,16.67,12.05],"2023":[9.43,9.21,11.75,14.31,16.82,20.19,22.33,26.33,26.22,21.1,16.35,12.36],"2024":[10.33,10.45,11.43,14.88,17.92,20.65,22.36,26.21,27.44,22.89,18.32,12.47],"2025":[9.68,8.05,9.58,12.65,15.74,19.18,24.35,25.41,24.16,22.64,17.54,13.14]},"전체":{"2021":[9.24,9.0,10.55,12.99,15.65,19.52,23.79,25.7,23.92,21.59,16.29,12.19],"2022":[9.1,7.81,9.31,12.52,15.77,19.27,23.06,24.2,23.09,19.58,16.26,11.59],"2023":[8.89,8.42,10.61,13.2,15.99,19.62,21.97,25.59,25.43,20.78,15.98,11.79],"2024":[9.5,9.25,10.28,13.9,16.92,20.17,22.19,26.17,26.92,22.48,18.03,12.22],"2025":[9.22,7.43,8.85,11.83,15.07,18.75,23.85,25.33,24.43,22.15,16.96,12.56]}},"total_obs":11602146};
  const MON=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const YEARS=DATA.years, SEAS=["전체",...DATA.seas];
  const YEARCOL=["#5b8ff9","#3fb27f","#f2a13c","#e0524a","#9b6dd6"];
  let sea="전체";

  // 온도 색 (RdYlBu 역순, [4,28])
  const RAMP=[[4,[49,54,149]],[9,[69,117,180]],[13,[116,173,209]],[16,[224,243,248]],
              [19,[254,224,144]],[22,[253,174,97]],[25,[244,109,67]],[28,[215,48,39]]];
  function tcol(t){
    if(t==null) return null;
    t=Math.max(RAMP[0][0],Math.min(RAMP[RAMP.length-1][0],t));
    for(let i=0;i<RAMP.length-1;i++){const[a,ca]=RAMP[i],[b,cb]=RAMP[i+1];
      if(t<=b){const f=(t-a)/(b-a);return`rgb(${ca.map((c,j)=>Math.round(c+(cb[j]-c)*f)).join(',')})`;}}
    return`rgb(${RAMP[RAMP.length-1][1].join(',')})`;
  }
  function lum(rgb){const m=rgb.match(/\d+/g).map(Number);return(0.299*m[0]+0.587*m[1]+0.114*m[2])/255;}
  const tip=document.getElementById("tip");
  function showTip(html,e){tip.innerHTML=html;tip.style.opacity="1";tip.style.left=e.clientX+"px";tip.style.top=(e.clientY-8)+"px";}
  function hideTip(){tip.style.opacity="0";}

  // 정적: 출처/램프/탭
  document.getElementById("obs").textContent=DATA.total_obs.toLocaleString()+"개";
  const g=[];for(let i=0;i<=12;i++){g.push(tcol(4+24*i/12)+" "+(i/12*100).toFixed(0)+"%");}
  document.getElementById("ramp").style.background="linear-gradient(90deg,"+g.join(",")+")";
  document.getElementById("foot").innerHTML=
    "※ 값은 각 해역 관측소들의 30분 간격 <b>표층수온 실측치를 월평균</b>한 값입니다. "+
    "동해=East, 서해=Yellow, 남해=South Sea. '전체'는 관측수 가중 평균. "+
    "출처: <b>국립수산과학원 실시간 연안 해양관측</b> 자료.";

  const tabsEl=document.getElementById("tabs");
  SEAS.forEach(s=>{
    const b=document.createElement("button");
    b.className="tab";b.textContent=s;b.setAttribute("role","tab");
    b.setAttribute("aria-selected",s===sea);
    b.onclick=()=>{sea=s;[...tabsEl.children].forEach(c=>c.setAttribute("aria-selected",c.textContent===s));render();};
    tabsEl.appendChild(b);
  });

  function grid(){return DATA.data[sea];} // {year:[12]}
  function allVals(){const a=[];YEARS.forEach(y=>grid()[y].forEach(v=>{if(v!=null)a.push(v);}));return a;}

  function render(){
    const G=grid();

    // KPI
    const vals=allVals();
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    let hi={v:-99},lo={v:99};
    YEARS.forEach(y=>G[y].forEach((v,m)=>{if(v==null)return;
      if(v>hi.v)hi={v,y,m};if(v<lo.v)lo={v,y,m};}));
    // 연평균 최고 연도
    const yrMean=YEARS.map(y=>{const a=G[y].filter(v=>v!=null);return{y,m:a.reduce((x,v)=>x+v,0)/a.length};});
    const warm=yrMean.reduce((a,b)=>b.m>a.m?b:a);
    const kpi=(k,v,u,sub)=>`<div class="kpi"><p class="k">${k}</p><div><span class="v">${v}</span> <span class="u">${u}</span></div><p class="sub">${sub}</p></div>`;
    document.getElementById("kpis").innerHTML=
      kpi("5년 평균 수온",mean.toFixed(1),"°C",sea+" · 2021–2025 월평균")+
      kpi("최난월",hi.v.toFixed(1),"°C",hi.y+"년 "+MON[hi.m])+
      kpi("최한월",lo.v.toFixed(1),"°C",lo.y+"년 "+MON[lo.m])+
      kpi("최난 연도",warm.m.toFixed(1),"°C",warm.y+"년 연평균");

    document.getElementById("hmsub").textContent=sea+" · 셀 = 월평균 표층수온(℃)";
    document.getElementById("atsub").textContent=sea+" · 12개월 평균";

    // 히트맵
    let cols="80px repeat(12,1fr)";
    let html=`<div class="hm" style="grid-template-columns:${cols}">`;
    html+=`<div class="hhead"></div>`+MON.map(m=>`<div class="hhead">${m}</div>`).join("");
    YEARS.forEach(y=>{
      html+=`<div class="hrow">${y}</div>`;
      G[y].forEach((v,m)=>{
        if(v==null){html+=`<div class="hcell na">–</div>`;return;}
        const c=tcol(v),ink=lum(c)>0.62?"#12303a":"#ffffff";
        html+=`<div class="hcell" style="background:${c};color:${ink}" data-y="${y}" data-m="${m}" data-v="${v}">${v.toFixed(1)}</div>`;
      });
    });
    html+=`</div>`;
    document.getElementById("hm").innerHTML=html;
    const newHm=document.querySelectorAll(".hm .hcell:not(.na)");
    newHm.forEach(c=>{
      c.addEventListener("mousemove",e=>showTip(`<div class="tt">${sea} · ${c.dataset.y}년 ${MON[+c.dataset.m]}</div><div class="tr"><span>표층수온</span><b>${(+c.dataset.v).toFixed(1)}°C</b></div>`,e));
      c.addEventListener("mouseleave",hideTip);
    });

    // 라인차트
    drawLine(G);
    // 연평균 막대
    const maxM=Math.max(...yrMean.map(d=>d.m)),minM=Math.min(...yrMean.map(d=>d.m));
    document.getElementById("abar").innerHTML=yrMean.map(d=>{
      const h=18+ (d.m-minM)/((maxM-minM)||1)*78; // 18~96%
      const hot=d.y===warm.y;
      return`<div class="col"><span class="bv" style="color:var(--ink)">${d.m.toFixed(1)}°</span><div class="bar" style="height:${h}%;background:var(--accent);opacity:${hot?1:.5}"></div><span class="by" style="${hot?'color:var(--ink)':''}">${d.y}</span></div>`;
    }).join("");
  }

  function drawLine(G){
    const W=560,H=290,L=38,R=12,T=12,B=26, iw=W-L-R, ih=H-T-B;
    const ymin=0,ymax=30;
    const px=m=>L+(m/11)*iw, py=v=>T+(1-(v-ymin)/(ymax-ymin))*ih;
    let s=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${sea} 월별 표층수온 연도별 곡선">`;
    for(let t=0;t<=30;t+=5){const yy=py(t);
      s+=`<line class="grid" x1="${L}" y1="${yy}" x2="${W-R}" y2="${yy}"/>`;
      s+=`<text class="atick" x="${L-6}" y="${yy+3}" text-anchor="end">${t}</text>`;}
    MON.forEach((m,i)=>{s+=`<text class="atick" x="${px(i)}" y="${H-8}" text-anchor="middle">${i+1}</text>`;});
    YEARS.forEach((y,yi)=>{
      const pts=G[y].map((v,m)=>v==null?null:[px(m),py(v)]).filter(Boolean);
      const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
      s+=`<path class="yline" d="${d}" stroke="${YEARCOL[yi]}"/>`;
    });
    // 월별 호버 영역
    for(let m=0;m<12;m++){s+=`<rect x="${px(m)-iw/22}" y="${T}" width="${iw/11}" height="${ih}" fill="transparent" data-m="${m}"/>`;}
    s+=`</svg>`;
    const box=document.getElementById("line");box.innerHTML=s;
    box.querySelectorAll("rect[data-m]").forEach(r=>{
      r.addEventListener("mousemove",e=>{
        const m=+r.dataset.m;
        let rows=YEARS.map((y,yi)=>{const v=G[y][m];return v==null?"":`<div class="tr"><span style="color:${YEARCOL[yi]}">■</span> ${y} <b>${v.toFixed(1)}°</b></div>`;}).join("");
        showTip(`<div class="tt">${sea} · ${MON[m]}</div>${rows}`,e);
      });
      r.addEventListener("mouseleave",hideTip);
    });
    // 범례
    document.getElementById("ylegend").innerHTML=YEARS.map((y,yi)=>`<span class="lg"><i style="background:${YEARCOL[yi]}"></i>${y}</span>`).join("");
  }

  render();
})();
</script>

</body>
</html>
