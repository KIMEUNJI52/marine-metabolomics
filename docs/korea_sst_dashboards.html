    });
  }

    const sorted=ST.slice().filter(s=>val(s)!=null).sort((a,b)=>val(b)-val(a));

  }
  render();
})();

    const box=document.getElementById("line");box.innerHTML=s;
    box.querySelectorAll("rect[data-m]").forEach(r=>{

  }

  render();
})();

  // ── GeoJSON 경계로 투영 자동 맞춤 ──
  let mnX=1e9,mxX=-1e9,mnY=1e9,mxY=-1e9;
  function scan(c){ if(typeof c[0]==="number"){mnX=Math.min(mnX,c[0]);mxX=Math.max(mxX,c[0]);mnY=Math.min(mnY,c[1]);mxY=Math.max(mxY,c[1]);} else c.forEach(scan); }
  GEO.features.forEach(f=>scan(f.geometry.coordinates));
  const midLat=(mnY+mxY)/2, K=Math.cos(midLat*Math.PI/180);
  const TW=560, TH=680;
  const gW=(mxX-mnX)*K, gH=(mxY-mnY);
  const SC=Math.min(TW/gW, TH/gH);
  const proj=([lon,lat])=>[ (lon-mnX)*K*SC, (mxY-lat)*SC ];
  const vbW=gW*SC, vbH=gH*SC;

  function ringPath(r){return r.map((p,i)=>(i?'L':'M')+proj(p).map(v=>v.toFixed(1)).join(' ')).join('')+'Z';}
  function geomPath(g){
    if(g.type==="Polygon") return g.coordinates.map(ringPath).join('');
    if(g.type==="MultiPolygon") return g.coordinates.map(poly=>poly.map(ringPath).join('')).join('');

    by[sea].forEach(s=>{rows+=`<tr class="row"><td class="nm"><span class="sw" style="background:${color(s[3])}"></span>${s[0]}</td><td class="tp">${s[3].toFixed(1)}°C</td></tr>`;});
  });
  document.querySelector("#tbl tbody").innerHTML=rows;

  // 호버 툴팁
  const tip=document.getElementById("tip"),mapEl=document.getElementById("map");
  mapEl.querySelectorAll(".dot").forEach(g=>{
    const s=STATIONS[+g.dataset.i];
    g.addEventListener("mousemove",e=>{
      const r=mapEl.getBoundingClientRect();
      tip.style.left=(e.clientX-r.left)+"px";tip.style.top=(e.clientY-r.top)+"px";
      tip.style.opacity="1";
      tip.innerHTML=`<div class="t-sea">${s[4]}</div>${s[0]} · <b>${s[3].toFixed(1)}°C</b>`;
      g.querySelector("circle").setAttribute("r","10.5");
    });
    g.addEventListener("mouseleave",()=>{tip.style.opacity="0";g.querySelector("circle").setAttribute("r","8.5");});
  });
})();
<\/script>

</body>

  <script>
    var tabs=[].slice.call(document.querySelectorAll(".navbtn"));
    var frame=document.getElementById("frame");
    function show(i){
      var raw=document.getElementById("d"+i).textContent;
      frame.srcdoc=raw.split("<\\/script>").join("<\/script>");
      tabs.forEach(function(t){t.setAttribute("aria-selected", +t.dataset.i===i);});
    }
    tabs.forEach(function(t){t.addEventListener("click",function(){show(+t.dataset.i);});});
    show(0);
  </script>
